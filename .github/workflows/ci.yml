name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:

jobs:
  lint:
    name: Lint
    # Depot runner with the Dagger engine pinned to the dagger.json engineVersion
    # (same convention as apoxy-cli / apoxy-cloud). The CLI is pre-installed by the
    # ,dagger=<ver> label suffix; no install step is needed.
    runs-on: depot-ubuntu-22.04-16,dagger=0.19.10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Run golangci-lint via Dagger
        env:
          SHUTUP: 1
        run: dagger call -v lint --src=.

  test:
    name: Test (${{ matrix.arch }})
    needs: lint
    # Run the full suite — including the AF_XDP/XSK and forwarder integration
    # tests that need a real kernel + NET_ADMIN — on BOTH amd64 and arm64. The
    # arm64 leg covers the weak-memory aarch64 datapath the old slavc/xdp binding
    # broke on, which previously was only ever exercised by a developer running
    # scripts/test-xsk.sh locally.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: depot-ubuntu-22.04-16,dagger=0.19.10
            arch: amd64
          - runner: depot-ubuntu-22.04-arm-16,dagger=0.19.10
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Run tests via Dagger
        env:
          SHUTUP: 1
        timeout-minutes: 20
        # The Test function runs `go test -race ./...` with InsecureRootCapabilities
        # so it can create veth pairs, load the XDP redirect program and bind AF_XDP
        # sockets on the runner's real kernel.
        run: dagger call -v test --src=.

  build-cli:
    name: Build icx (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Build icx
        working-directory: cli
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euxo pipefail
          go build -trimpath -ldflags="-s -w" -o icx
          mkdir -p ../dist
          mv icx ../dist/icx_linux_${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icx_linux_${{ matrix.goarch }}
          path: dist/icx_linux_${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, build-cli]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/icx_linux_amd64/icx_linux_amd64
            dist/icx_linux_arm64/icx_linux_arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
